# Nixpacks build config for Railway. Nix's python311 is PEP-668
# externally-managed and lives in the read-only /nix/store, so we cannot
# install packages into it. The standard fix (which uv itself recommends in
# its error message) is to install into a virtual env. We create /opt/venv,
# install the project into it, and point the start command at the venv's
# uvicorn binary directly.
[phases.setup]
nixPkgs = ["python311", "gcc", "uv"]

[phases.install]
cmds = [
  "uv venv /opt/venv --python python3.11",
  "uv pip install --python /opt/venv/bin/python ."
]

[start]
cmd = "/opt/venv/bin/uvicorn src.api.server:app --host 0.0.0.0 --port $PORT"
