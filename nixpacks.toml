# Nixpacks build config for Railway. Uses `uv sync --frozen --no-dev` to
# install the project from uv.lock, which pins every transitive dependency
# (124 packages) to an exact version + hash. This gives reproducible builds
# regardless of Nixpkgs channel drift in Railway's nixpacks image. The Nix
# python311 is PEP-668 externally-managed and lives in the read-only
# /nix/store, so `uv sync` creates a venv at /app/.venv instead of trying
# to write into the system interpreter.
[phases.setup]
nixPkgs = ["python311", "gcc", "uv"]

[phases.install]
cmds = ["uv sync --frozen --no-dev --python python3.11"]

[start]
cmd = "/app/.venv/bin/uvicorn src.api.server:app --host 0.0.0.0 --port $PORT"
