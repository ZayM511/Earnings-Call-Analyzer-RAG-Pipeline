# Nixpacks build config for Railway. Pins Python and tells the builder to
# install the project via pip (pyproject.toml-aware). Dev dependencies live
# under [dependency-groups] and are ignored by pip, which is what we want.
[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "gcc"]

[phases.install]
cmds = ["python -m pip install --upgrade pip", "pip install ."]

[start]
cmd = "uvicorn src.api.server:app --host 0.0.0.0 --port $PORT"
