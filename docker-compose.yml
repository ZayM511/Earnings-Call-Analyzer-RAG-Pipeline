# docker-compose.yml - local dev Postgres with pgvector + the read-only role
# used by the postgres MCP server.
#
# Bring it up:    docker compose up -d
# Bring it down:  docker compose down
# Reset volumes:  docker compose down -v   (destroys data!)
#
# Project name and volume name are pinned so the data survives moving the
# repo to a different parent directory. Without these, docker-compose would
# derive the volume name from the cwd folder name.

name: earningsrag

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: earningsrag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: earningsrag
      POSTGRES_USER: earningsrag
      POSTGRES_PASSWORD: earningsrag
      # Faster startup in dev. Don't use these settings in production.
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    ports:
      # Host port 5433 so this project's DB can run alongside the sibling NBA
      # project (which holds 5432). Inside the container Postgres still listens
      # on the default 5432.
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Init scripts run alphabetically on FIRST startup only.
      # 01_extensions.sql enables pgvector + tsvector.
      # 02_readonly_role.sql creates the role used by the postgres MCP server.
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U earningsrag -d earningsrag"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Browser-based Postgres UI for inspection / screenshots.
  # Reach it at http://localhost:8080 once docker compose up -d completes.
  # Login is pre-filled via environment vars below.
  adminer:
    image: adminer:5
    container_name: earningsrag-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # Host port 8081 so this project's Adminer can run alongside the sibling
      # NBA project's Adminer on 8080.
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DEFAULT_DRIVER: pgsql
      ADMINER_DEFAULT_DB: earningsrag
      ADMINER_DESIGN: dracula

volumes:
  postgres-data:
    name: earningsrag_postgres_data
    driver: local
